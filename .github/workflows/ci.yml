name: ci

# Runs on PRs to main (easy to mark as a required status in branch protection)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential sqlite3 libsqlite3-dev libcurl4-openssl-dev

      - name: Build
        run: make RELEASE=1

      - name: Test
        run: make test

  # Single aggregate check that succeeds only if all matrix jobs succeed (use as one required check)
  ci-success:
    name: ci (required)
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all matrix jobs to succeed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more test jobs failed or were cancelled."
            exit 1
          fi
          echo "All test jobs succeeded."
