# Bao configuration — multiple providers in one repository
#
# bao reads flat "key: value" lines only (nested YAML is not supported).
# Typical pattern for multiple vendors:
#   - Put profile directories under prompts/ (e.g. prompts/p0/, prompts/p1/)
#   - Pick the active profile with `profile`, combined with `prompts_dir: prompts`
#     (bao resolves prompts/<profile>/ internally)
#   - `provider` identifies the vendor; `profile` is your operational label
#   - After switching, stage with `bao add bao.yaml` and the relevant prompts, then `bao commit`
#
# --- Currently active: OpenAI ---
provider: openai
profile: p0
model: gpt-4.1-mini
temperature: 0.2
max_tokens: 4096
prompts_dir: prompts
dataset: test_cases.jsonl
#
# --- Example: switch to Anthropic — comment out the block above and enable below ---
# provider: anthropic
# profile: p1
# model: claude-3-5-sonnet-20241022
# temperature: 0.2
# max_tokens: 4096
# prompts_dir: prompts
# dataset: test_cases.jsonl
#
# Optional: vendor-specific notes under providers/<name>/ can be versioned with `bao add`.
